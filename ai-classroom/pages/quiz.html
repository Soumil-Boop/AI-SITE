<head>

  <link rel="icon" type="image/svg+xml" href="../favicon.svg"/>

<body>
<div id="nav-mount"></div>

<div class="page-hero">
  <span class="eyebrow eyebrow--accent">Test Your Knowledge</span>
  <h1>Quick AI Quiz</h1>
  <p>See how much you have learned! Answer the questions below.</p>
</div>
<section style="background:linear-gradient(135deg,var(--brand-dark) 0%,#3A1608 100%);">
  <div class="section-inner">
    <div class="quiz-box">
      <div class="quiz-progress">
        <div class="quiz-bar-bg"><div class="quiz-bar-fill" id="quizBar" style="width:0%"></div></div>
        <span class="quiz-score" id="quizScore">0 / 5</span>
      </div>
      <div class="quiz-q" id="quizQ"><span id="quizNum">Q1.</span> <span id="quizText"></span></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="btn btn--primary" id="quizNext" onclick="nextQuestion()" style="display:none;">Next Question →</button>
      <div id="quizResult" style="display:none;text-align:center;padding-top:1rem;">
        <div style="font-size:3rem;margin-bottom:.75rem;" id="resultEmoji">🎉</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;color:white;" id="resultTitle"></div>
        <div style="color:rgba(255,255,255,.6);margin:.5rem 0 1.5rem;" id="resultDesc"></div>
        <button class="btn btn--primary" onclick="restartQuiz()">Try Again 🔄</button>
      </div>
    </div>
  </div>
</section>
<footer>

</footer>
